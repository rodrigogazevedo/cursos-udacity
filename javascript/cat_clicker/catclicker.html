<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="style.css" rel="stylesheet">
  <title>Cat Clicker</title>
</head>

<body>
  <div id="container">
    <img id="imagecat" src="kittycat.jpg" alt="kittycat">
    <p id="textoinfo">O número de vezes que o imagem do gatinho foi clicado foi
      <input id="input" type="text" value=0 disabled>
      vezes
    </p>
  </div>
</body>

<script>
  let contador = 0
  const element = document.getElementById("imagecat");
  element.addEventListener("click", function () {
    document.getElementById("input").value = ++contador;
  });
</script>

</html>
